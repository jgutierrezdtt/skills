name: CI

on:
  pull_request:
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  check-skill-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify skill versions bumped for changed skills
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base=${{ github.event.pull_request.base.sha }}
          else
            base=${{ github.event.before }}
          fi

          # Skip check on initial push (no previous commit) or force-push
          if [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "Initial or orphan push — skipping version check"
            exit 0
          fi

          exit_code=0
          for skill_dir in skills/*/; do
            [ -d "$skill_dir" ] || continue
            skill_name=$(basename "$skill_dir")

            # Check if any files in this skill changed (excluding SKILL.md itself)
            changed=$(git diff --name-only "$base" -- "$skill_dir" \
              | grep -v 'SKILL.md$' || true)

            if [ -n "$changed" ]; then
              # Content changed — did SKILL.md metadata.version change too?
              version_bumped=$(git diff "$base" -- "${skill_dir}SKILL.md" \
                | grep -E '^\+.*version:' || true)

              if [ -z "$version_bumped" ]; then
                echo "::error::Skill '$skill_name' has content changes but metadata.version in SKILL.md was not bumped"
                exit_code=1
              fi
            fi
          done
          exit $exit_code

  release-please:
    needs: check-skill-versions
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
    steps:
      - uses: actions/checkout@v6
      - id: release
        uses: fortify/3rdparty-actions/actions/googleapis/release-please-action/v4@main
        with:
          release-type: simple

  build-release-zip:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build release assets and signing manifest
        env:
          SIGN_KEY: ${{ secrets.SIGN_KEY }}
          SIGN_PASSPHRASE: ${{ secrets.SIGN_PASSPHRASE }}
        run: node .github/scripts/build-release.js "$RUNNER_TEMP/release"

      - name: Build release zip
        run: |
          cd "$RUNNER_TEMP/release"
          zip -r "$GITHUB_WORKSPACE/fortify-skills.zip" .

      - name: Upload zip as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fortify-skills-zip
          path: fortify-skills.zip
          retention-days: 1

  upload-release-asset:
    needs: [release-please, build-release-zip]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: fortify-skills-zip

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            fortify-skills.zip --clobber

  semantic-versions:
    needs: [release-please, build-release-zip]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        semantic_version:
          - v${{ needs.release-please.outputs.major }}.${{ needs.release-please.outputs.minor }}
          - v${{ needs.release-please.outputs.major }}
          - latest
    steps:
      - uses: actions/checkout@v6

      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: fortify-skills-zip

      - name: Update ${{ matrix.semantic_version }} tag
        uses: fortify/3rdparty-actions/actions/richardsimko/update-tag/v1@main
        with:
          tag_name: ${{ matrix.semantic_version }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Publish ${{ matrix.semantic_version }} release
        env:
          GH_TOKEN: ${{ github.token }}
          SEMANTIC_VERSION: ${{ matrix.semantic_version }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release delete "${SEMANTIC_VERSION}" -y || true
          gh release create "${SEMANTIC_VERSION}" \
            -t "${SEMANTIC_VERSION}" \
            -n "Semantic version release for [${RELEASE_TAG}](https://github.com/fortify/skills/releases/tag/${RELEASE_TAG})" \
            --verify-tag --latest=false
          gh release upload "${SEMANTIC_VERSION}" fortify-skills.zip --clobber
