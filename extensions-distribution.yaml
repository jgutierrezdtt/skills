# extensions-distribution.yaml
schemaVersion: "1.0"

# Content types and their discovery rules within the skills archive.
# Each content type defines how to find its entries in the source.
content-types:
  skills:
    source-dir: skills
    discover: directory
    entry-marker: SKILL.md
  agents:
    source-dir: agents
    discover: files
    file-pattern: "*.agent.md"
  plugins:
    discover: explicit

# Coding assistant definitions. Each assistant declares detection rules
# and installation targets.
#
# Directory conventions (based on VS Code, Copilot CLI, Claude Code docs):
#   VS Code reads personal skills from: ~/.copilot/skills, ~/.claude/skills, ~/.agents/skills
#   Copilot CLI reads personal skills from: ~/.copilot/skills, ~/.agents/skills
#   Claude Code reads personal skills from: ~/.claude/skills
#
# Strategy: install to ~/.claude/skills for Claude Code users (also read by VS Code),
# install to ~/.agents/skills for Copilot/Codex users (read by both VS Code and Copilot CLI).
# Copilot skips skills when Claude is installed to avoid duplicate skill entries in VS Code
# (VS Code reads both directories and may not deduplicate by skill name).
assistants:
  claude:
    display-name: Claude Code
    if:
      any-of:
        - dir-exists: ~/.claude
        - command-exists: claude
    targets:
      - content-type: skills
        target-dir: ~/.claude/skills
      - content-type: agents
        target-dir: ~/.claude/agents
      - content-type: plugins
        source-entries:
          - .claude-plugin
        target-dir: ~/.claude/.claude-plugin

  copilot:
    display-name: GitHub Copilot
    if:
      any-of:
        - dir-exists: ~/.copilot
        - dir-exists:
            linux: ~/.config/Code
            darwin: ~/Library/Application Support/Code
            windows: ${APPDATA}/Code
    targets:
      - content-type: skills
        target-dir: ~/.agents/skills
        # VS Code reads ~/.claude/skills natively; skip to avoid
        # duplicate skill entries in the VS Code skills menu
        skip-if:
          installed: claude/skills
      - content-type: agents
        target-dir:
          linux: ~/.config/Code/User/prompts/agents
          darwin: ~/Library/Application Support/Code/User/prompts/agents
          windows: ${APPDATA}/Code/User/prompts/agents

  codex:
    display-name: OpenAI Codex
    if:
      any-of:
        - dir-exists: ~/.codex
        - command-exists: codex
    targets:
      - content-type: skills
        target-dir: ~/.agents/skills
      - content-type: plugins
        source-entries:
          - .codex-plugin
        target-dir: ~/.codex/.codex-plugin

  gemini:
    display-name: Gemini CLI
    if:
      any-of:
        - command-exists: gemini
        - dir-exists: ~/.gemini
    targets:
      - content-type: skills
        target-dir: ~/.gemini/extensions/fortify-skills/skills
      - content-type: plugins
        source-entries:
          - gemini-extension.json
        target-dir: ~/.gemini/extensions/fortify-skills
